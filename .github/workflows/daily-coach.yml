name: Daily Coach Analysis

on:
  schedule:
    - cron: '0 9 * * *'  # 9h du matin chaque jour (UTC)
  workflow_dispatch:      # Permet de lancer manuellement

permissions:
  contents: write

jobs:
  coach-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase garminconnect

      - name: Configure git credentials
        run: |
          git config user.name "Coach Bot"
          git config user.email "coach@garmin2.local"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/hadhok/Garmin2.git

      - name: Run coach analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python3 sync_now.py --coach --plan --renpho
